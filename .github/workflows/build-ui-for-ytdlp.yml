# =============================================================================
# CI/CD workflow для автоматической сборки UI-for-ytdlp
# =============================================================================
# Сборка при:
#   - push в main
#   - теге v* (создаёт GitHub Release)
#   - pull request в main
#   - ручном запуске (workflow_dispatch)
#
# Для релиза нужен секрет VIRUSTOTAL_API (как в build-shell-for-ytdlp.yml).
# =============================================================================

name: Build UI-for-ytdlp

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Метка сборки для артефакта (например, 1.1.0 или dev)'
        required: false
        default: 'dev'

concurrency:
  group: build-ui-for-ytdlp-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.10'
  APP_NAME: UI-for-ytdlp
  # Для тегов — имя тега; для ручного запуска — input; иначе короткий SHA
  BUILD_ID: >-
    ${{
      startsWith(github.ref, 'refs/tags/') && github.ref_name ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version) ||
      github.sha
    }}

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Build with PyInstaller
        run: python -m PyInstaller --clean --noconfirm UI-for-ytdlp.spec

      - name: Verify build
        shell: pwsh
        run: |
          $exe = "dist\${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed: EXE file not found"
            exit 1
          }
          $fileSize = (Get-Item $exe).Length / 1MB
          Write-Host "Build successful! File size: $([math]::Round($fileSize, 2)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_ID }}-windows
          path: dist/${{ env.APP_NAME }}.exe
          retention-days: 30

  build-release:
    name: Create Release
    needs: build-windows
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_ID }}-windows
          path: dist/

      - name: Scan executable with VirusTotal
        id: virustotal_scan_exe
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API }}
          files: |
            dist/${{ env.APP_NAME }}.exe
          check_existing: true

      - name: Scan main.py with VirusTotal
        id: virustotal_scan_source
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API }}
          files: |
            main.py
          check_existing: true

      - name: Generate release notes
        shell: pwsh
        env:
          VT_EXE_ANALYSIS: ${{ steps.virustotal_scan_exe.outputs.analysis }}
          VT_SOURCE_ANALYSIS: ${{ steps.virustotal_scan_source.outputs.analysis }}
        run: |
          function Get-VirusTotalUrl([string]$analysis) {
            if ($analysis -match '=(https://.+)$') { return $Matches[1] }
            return $analysis
          }

          $tag = '${{ github.ref_name }}'
          $notesFile = 'release_notes.txt'
          $customNotes = ".github/release-notes/$tag.md"
          $exeUrl = Get-VirusTotalUrl $env:VT_EXE_ANALYSIS
          $sourceUrl = Get-VirusTotalUrl $env:VT_SOURCE_ANALYSIS

          if (Test-Path $customNotes) {
            Get-Content $customNotes -Raw | Set-Content -Path $notesFile -Encoding utf8
          } else {
            $prevTag = git tag --sort=-version:refname | Where-Object { $_ -ne $tag } | Select-Object -First 1
            if ($prevTag) {
              git log "$prevTag..HEAD" --pretty=format:"- %s" | Set-Content -Path $notesFile -Encoding utf8
            } else {
              git log -15 --pretty=format:"- %s" | Set-Content -Path $notesFile -Encoding utf8
            }
          }

          Add-Content -Path $notesFile -Value ""
          Add-Content -Path $notesFile -Value "#### VirusTotal Report"
          Add-Content -Path $notesFile -Value "- [${{ env.APP_NAME }}.exe]($exeUrl)"
          Add-Content -Path $notesFile -Value "- [main.py]($sourceUrl)"

          Write-Host "--- Release notes ---"
          Get-Content $notesFile | Write-Host

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ env.APP_NAME }}.exe" -DestinationPath "${{ env.APP_NAME }}-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Version ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/${{ env.APP_NAME }}.exe
            ${{ env.APP_NAME }}-${{ github.ref_name }}.zip
          body_path: release_notes.txt
          draft: false
          prerelease: false
